<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxMode</title>
</head>
<style>
    *{
        margin:0;
        padding:0;

    }
    .box{
        background-color:aqua;
    }
    .box1{
        color:Blue;
        padding:10px;
        margin:25px;
        border:2px solid black;
        height:200px;
        
        box-sizing:border-box;
    }
    .box2{
        color:red;
        padding:10px;
        margin:25px;
        border:2px solid blue;
        height:200px;
        
        box-sizing:border-box;
    }
</style>
<!-- Margin collaps concept read this -->
 <!-- box-sizing : border-box means= padding + border -->
<body>
    <div class="box box1">I am a box1</div>
    <div class="box box2">I am a box2</div>   
</body>
</html>
