<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>
<style>
    *{
        margin:0px;
        padding:0px;
    }
.box{
    border: 2px solid black;
    /* display:inline; */
    display:inline-block;
    padding:45px;
    margin:35px;

}
.box1{
    border:2px solid black;
    display:inline;
    margin:43px;
    padding:45px;
    /* display:none; */
    /* visibility:hidden; */
    display:flex;
    justify-content: center;

}
</style>
</head>
<body>
    <div class="box1">
        I am a Box
    </div>
    <div class="box">I am also a nice box</div>
    <span>I am a Good</span>
    <span>Boy</span>
</body>
</html>
