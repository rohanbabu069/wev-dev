<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styling</title>
    <style>
        .box1 ol li {
            list-style :devanagari;
            background-color:aqua; /*this property work on content not marker(marker is not included) then we use "list-style-position"*/
            list-style-position:inside ;
            border:2px solid black;
            /* list-style-image:url("https://share.google/9InzprUceCcK3Pytl.") */
            list-style-type:""/* read image and emogi concept*/
        }
    </style>
</head>
<body>
    <nav class="box1">
        <ol>
            <li>Home</li>
            <li>About</li>
            <li>Contect</li>
            <li>Services</li>
        </ol>
    </nav>
</body>
</html>
