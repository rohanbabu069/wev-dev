<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position_CSS</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .parent{
            padding:15px;
            border:2px solid green;
            margin:30px;
            position:absolute;
        }
        .box{
            border:2px solid black;
            height:533px;
            width:80vw;
            padding:3px;
            margin:2px;
        }
        .box1{background-color:red;
        /* position:absolute;
        position:fixed; */
        height:10vh;
        z-index:1;
       
    /* top:0px; */
left:49px;
/* bottom:0px; */
        }
        .box2{background-color: yellow;
        /* position:relative; */
         position:sticky;
         padding:0px;
         margin:0px;
        /* top:25px; */
        left:20px;
    /* z-index:0; */
}/* by default value of position is static so we can not change its position so we firstly use "position:relative sothat wen apply z-index or changes in its position."*/
        .box3{background-color:orange;
        position:relative;}
        .box4{background-color:green;
        }
    </style>
</head>
<body><div class="parent">
    <div class="box box1">Box1</div>
    <div class="box box2">Box2</div>
    <div class="box box3">Box3</div>
    <div class="box box4">Box4</div>
</div>
</body>
</html>
