<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
</head>
<style>
    /* div{
        color:red;
        background-color:yellow
    } */


/* It is class selector */
     .red{
        background-color:red;
     }

     /* ID Selector */

 #green{
    background-color:green;

 }
 /* Child Selector => work on direct child */
 /* div> p{
    color:aqua;
    background:rgba(188, 180, 85, 0.479)
 } */

 /* Descendant Selector => work=> tag space anoter tag*/

 div p{
    color:white;
 }

/* Universal Selector => work on all tag*/

*{
    margin:0;
    padding:0;
}

/* Pseudo Selector */
a:visited{
 color:rgb(10, 61, 247)
}
a:active{
    color:red;
}
a:hover{
    background:green;
}
p:first-child{
    background-color:blueviolet; 
}
</style>
<body>
    <h1>This is heading 1</h1>
    <p>This is peragraph</p>
    <div id="green">This is container 1
        <p>Lorem ipsum dolor sit amet consectetur.</p>
    </div>
    <div class="red">This is container 2
       <article> <p> hello another peragraph</p></article>
      
    </div>
    <div>
     <a href='http://www.google.com'>Goto google</a>
        </div>
    </body>
</html>
