<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows and outline</title>
    <style>
        /* box-shadow: h-offset v-offset blur spread color inset; */
        *{
            margin:0;
            padding:0;
        }
        .box1{
            border:2px solid black;
            padding:25px;
            box-shadow: 15px 6px 5px red 
        }
        .text-element{
            margin:19px;
            text-shadow:1px 3px 2px green;
            outline: 2px solid maroon;
            outline-offset: 5px; /* change the size of outline*/
            border:2px solid black;
            border-radius: 8px; /* outline follow border radious */
        }
    </style>
</head>
<body>
    <div class="box1">I am box</div>
    <p class="text-element">Lorem ipsum dolor sit amet consectetur adipisicing elit. Officia perferendis id odit consequatur cumque nulla, ab incidunt nostrum? Numquam unde sequi, molestias repudiandae earum tempora.</p>
    
</body>
</html>
