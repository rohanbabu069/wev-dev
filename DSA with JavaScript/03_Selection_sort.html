<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03_Selection insertionSort</title>
</head>
<script>
    let arr=[12,11,14,6,7];
    function insertionSort(data){
        let i,current,j
        for(i=1;i<data.length;i++){
            current=data[i];
            j=i-1;
            while(j>=0 && data[j]>current){
                data[j+1]=data[j]
                j--
            }
            data[j+1]=current
        }
    }
    insertionSort(arr)
    console.log(arr)
</script>
